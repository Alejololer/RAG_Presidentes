# =============================================================================
# RAG Presidentes Ecuador - Docker Compose
# Lee configuracion de .env (copiar .env.example a .env y editar).
# =============================================================================

services:
  rag:
    # Por defecto usa la imagen PUBLICA del registry (`alejololer/rag-presidentes:1.0.0`).
    # Es el mismo nombre con el que:
    #   - los setup scripts taggean el build local (setup.ps1 / setup.sh)
    #   - publish.ps1 / publish.sh pushean a Docker Hub
    # Por eso todo es congruente: en una PC nueva `docker compose up` BAJA la imagen
    # publica; en una PC de dev que ya buildeo, usa el build local (mismo tag) y no baja nada.
    #
    # Para fijar otra version/tag:  en .env -> RAG_IMAGE=alejololer/rag-presidentes:X.Y.Z
    #
    # Si la imagen elegida no existe local ni en el registry, Docker hace fallback a `build:`.
    image: ${RAG_IMAGE:-alejololer/rag-presidentes:1.0.0}
    container_name: rag-presidentes
    # Build local (fallback). Se usa si:
    #   - la imagen no esta en Docker Hub todavia
    #   - estas desarrollando y cambiaste codigo (setup.ps1 build)
    # OJO: el Dockerfile hornea chroma_db/ por COPY (no lo genera en build).
    # Necesitas chroma_db/ local antes de buildear. Los setup scripts lo generan
    # solos; si haces `docker compose build` directo, corre antes
    # `python generate_embeddings.py` (usa GPU si esta disponible).
    build:
      context: .
      dockerfile: Dockerfile
      # Multi-arch: construye para la plataforma del host.
      # Para forzar una plataforma:  docker buildx build --platform linux/amd64 ...
      args:
        - BUILDPLATFORM=${BUILDPLATFORM:-}
    ports:
      - "${PUERTO:-8010}:8010"
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:7b}
      - RAG_TOP_K=${RAG_TOP_K:-5}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    # chroma_db viene precomputado dentro de la imagen (decision: bake).
    # Para regenerar en runtime, descomentar el volume de abajo.
    # volumes:
    #   - ./chroma_db:/app/chroma_db
    restart: unless-stopped
    # Modo de red del contenedor.
    # - "host" : el contenedor usa la red del host. Necesario en Linux
    #            (porque host.docker.internal no funciona en el bridge de Docker
    #            en Linux). OLLAMA queda accesible en http://localhost:11434.
    # - "bridge" (default): red bridge. Funciona en Windows/macOS con Docker
    #            Desktop, donde OLLAMA queda accesible via host.docker.internal.
    # El setup script detecta el OS y setea USE_HOST_NETWORK=host en Linux.
    # Valor default: "bridge".
    network_mode: ${USE_HOST_NETWORK:-bridge}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8010/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
